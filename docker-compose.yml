services:
  frontend:
    build: .
    expose:
      - "80"

  backend:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - ./backend/survey.db:/app/survey.db

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - frontend
      - backend
